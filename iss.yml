---
- name: Auditoría de IIS y .NET
  hosts: all
  gather_facts: false
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: 5985
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore

  tasks:
    - name: Obtener Sitios IIS con Bindings y Versiones .NET
      ansible.windows.win_shell: |
        # 1. Obtener Sitios y sus Bindings de forma limpia
        Import-Module WebAdministration
        $sitios = Get-Website | Select-Object Name, State, PhysicalPath, @{
            Name = 'Bindings'
            Expression = { ($_.Bindings.Collection | ForEach-Object { $_.bindingInformation }) -join ' | ' }
        }

        # 2. Obtener Versiones de .NET y limpiar el string (solo nombres y versiones)
        $rawRuntimes = dotnet --list-runtimes
        $cleanRuntimes = $rawRuntimes | ForEach-Object {
            # Limpiamos la ruta entre corchetes para que solo quede el nombre y versión
            $_ -replace ' \[.*\]', ''
        }

        # 3. Consolidar todo el reporte
        $reporte = @{
            IIS_Websites = $sitios
            DotNet_Framework = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full" -ErrorAction SilentlyContinue).Version
            DotNet_Core_Modern = $cleanRuntimes
        }

        $reporte | ConvertTo-Json
      register: auditoria

    - name: Resultado Final
      debug:
        var: auditoria.stdout | from_json